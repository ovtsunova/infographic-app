name: Check infographic-app project

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]
  workflow_dispatch:

permissions:
  contents: read

env:
  FLUTTER_VERSION: "3.41.7"
  DART_VERSION: "3.11.5"

jobs:
  client:
    name: Check Flutter client
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install client dependencies
        run: flutter pub get

      - name: Analyze client code
        run: |
          echo "Проверка клиентской части..."
          flutter analyze

      - name: Run client tests
        run: |
          echo "Запуск тестов клиентской части..."
          flutter test

      - name: Build Flutter web
        run: |
          echo "Сборка Flutter Web..."
          flutter build web --release

  server:
    name: Check Dart server
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ env.DART_VERSION }}

      - name: Show Dart version
        run: dart --version

      - name: Install server dependencies
        run: dart pub get

      - name: Analyze server code
        run: |
          echo "Проверка серверной части..."
          dart analyze

      - name: Run server tests
        run: |
          echo "Запуск тестов серверной части..."
          dart test

  final-check:
    name: Final project check
    runs-on: ubuntu-latest
    needs: [client, server]

    steps:
      - name: Success message
        run: |
          echo "Все проверки проекта успешно пройдены:"
          echo "- клиентская часть Flutter проверена;"
          echo "- серверная часть Dart проверена;"
          echo "- тесты выполнены;"
          echo "- веб-сборка создана."