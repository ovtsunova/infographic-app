name: Check infographic-app project

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]
  workflow_dispatch:

permissions:
  contents: read

env:
  FLUTTER_VERSION: "3.41.7"
  DART_VERSION: "3.11.5"

jobs:
  client:
    name: Check Flutter client
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
          pub-cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install client dependencies
        run: |
          for i in 1 2 3; do
            echo "Попытка установки зависимостей клиента: $i"
            if flutter pub get; then
              echo "Зависимости клиента успешно установлены."
              exit 0
            fi

            echo "Не удалось получить зависимости клиента. Повтор через 20 секунд..."
            sleep 20
          done

          echo "Не удалось установить зависимости клиента после 3 попыток."
          exit 1

      - name: Analyze client code
        run: |
          echo "Проверка синтаксических ошибок и предупреждений в клиентской части..."
          flutter analyze --no-pub --no-fatal-infos
          echo "Клиентская часть успешно прошла flutter analyze."

      - name: Run client tests
        run: |
          echo "Запуск тестов клиентской части..."
          flutter test --no-pub
          echo "Тесты клиентской части успешно пройдены."

      - name: Build Flutter web
        run: |
          echo "Сборка Flutter Web..."
          flutter build web --release --no-pub
          echo "Flutter Web успешно собран."

  server:
    name: Check Dart server
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ env.DART_VERSION }}

      - name: Show Dart version
        run: dart --version

      - name: Install server dependencies
        run: |
          for i in 1 2 3; do
            echo "Попытка установки зависимостей сервера: $i"
            if dart pub get; then
              echo "Зависимости сервера успешно установлены."
              exit 0
            fi

            echo "Не удалось получить зависимости сервера. Повтор через 20 секунд..."
            sleep 20
          done

          echo "Не удалось установить зависимости сервера после 3 попыток."
          exit 1

      - name: Analyze server code
        run: |
          echo "Проверка синтаксических ошибок и предупреждений в серверной части..."
          dart analyze
          echo "Серверная часть успешно прошла dart analyze."

      - name: Run server tests
        run: |
          echo "Запуск тестов серверной части..."
          dart test
          echo "Тесты серверной части успешно пройдены."

  final-check:
    name: Final project check
    runs-on: ubuntu-latest
    needs: [client, server]

    steps:
      - name: Success message
        run: |
          echo "Все проверки проекта успешно пройдены:"
          echo "- клиентская часть Flutter проверена;"
          echo "- серверная часть Dart проверена;"
          echo "- тесты выполнены;"
          echo "- веб-сборка создана."